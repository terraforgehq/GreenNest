<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Nunito',sans-serif;
}

body{

}

header{
    background:linear-gradient(135deg,#2E7D32,#4CAF50);
    color:#FAF8F2;
    text-align:center;
    padding:100px 25px 90px;
}

header h1{
    font-family:'Poppins',sans-serif;

    line-height:1;
    letter-spacing:-2px;
    margin-bottom:12px;
}
 
header p{
    margin-top:15px;
    font-size:20px;
}

.tagline{
    font-family:'Cormorant Garamond',serif;
    font-size:28px;
    font-style:italic;
    color:#F8F5E9;
    margin-bottom:36px;
    letter-spacing:1px;
 }

header h2{
    font-family:'Poppins',sans-serif;
    font-size:42px;
    font-weight:600;
    line-height:1.3;
    max-width:750px;
    margin:0 auto 30px;
}
 
 .intro{
    font-size:24px;
    color:#F2F2F2;
    max-width:700px;
    margin:0 auto 40px;
    line-height:1.6;
 }
 
.btn{
    display:inline-block;
    padding:18px 42px;
    background:#FAF8F2;
    color:#2E7D32;
    text-decoration:none;
    border-radius:50px;
    font-size:18px;
    font-weight:700;
    box-shadow:0 12px 25px rgba(0,0,0,.15);
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

section{
padding:50px 20px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
background:white;
width:300px;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.card h3{
margin-bottom:10px;
}

.whatsapp{
display:inline-block;
margin-top:15px;
background:#25D366;
color:white;
padding:10px 20px;
border-radius:25px;
text-decoration:none;
}

footer{
margin-top:40px;
background:#2e7d32;
color:white;
text-align:center;
padding:20px;

 <header>
